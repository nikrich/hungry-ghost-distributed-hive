name: CDK Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/cdk/**'
  workflow_dispatch:
    inputs:
      stack:
        description: 'Stack to deploy (leave empty for all)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: af-south-1

jobs:
  synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: CDK Synth
        working-directory: infra/cdk
        run: npx cdk synth

      - name: Upload cloud assembly
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

  deploy:
    name: CDK Deploy
    needs: synth
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json

      - name: Install dependencies
        working-directory: infra/cdk
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Deploy
        working-directory: infra/cdk
        run: |
          if [ -n "${{ inputs.stack }}" ]; then
            npx cdk deploy "${{ inputs.stack }}" --require-approval never
          else
            npx cdk deploy --all --require-approval never
          fi

  deploy-frontend:
    name: Deploy Frontend
    needs: deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=src/web
        env:
          VITE_API_URL: ${{ vars.API_URL }}
          VITE_WS_URL: ${{ vars.WS_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync src/web/dist s3://${{ vars.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
